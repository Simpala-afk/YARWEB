<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали тарифа — YARWEB</title>
    <style>
        :root {
            --bg-color: #fcfbf9;
            --text-main: #1a153a;
            --text-muted: #615c85;
            --card-bg: #ffffff;
            --card-border: rgba(26, 21, 58, 0.05);
            --grid-opacity: 0.02;
        }

        body.dark-theme {
            --bg-color: #0b0819;
            --text-main: #fcfbf9; 
            --text-muted: #9fa8da; 
            --card-bg: #131026; 
            --card-border: rgba(255, 255, 255, 0.05);
            --grid-opacity: 0.04;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Сеточный фон */
        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(26, 21, 58, var(--grid-opacity)) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26, 21, 58, var(--grid-opacity)) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0; pointer-events: none;
        }

        /* --- СТИЛИЗАЦИЯ ТВОИХ ФИГУР С ОРИГИНАЛЬНЫМИ ГРАДИЕНТАМИ --- */
        .decor-shape {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            opacity: 0; /* Изначально скрыты в центре для влёта */
            /* Плавный переход позиций, размеров и размытия */
            transition: all 1.4s cubic-bezier(0.25, 1, 0.3, 1);
        }

        body.loaded .decor-shape {
            opacity: 0.85;
        }

        /* 1. Синяя сфера */
        .shape-sphere {
            background: radial-gradient(circle at 30% 30%, #5ce1e6, #36b5d8 40%, #1c7293);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(54, 181, 216, 0.3);
        }

        /* 2. Фиолетовая капля/загогулина */
        .shape-blob {
            background: radial-gradient(circle at 30% 30%, #bf55ec, #8e44ad 50%, #5e2775);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            box-shadow: 0 10px 30px rgba(142, 68, 173, 0.3);
        }

        /* 3. Розовый тор (пончик) */
        .shape-donut {
            border-style: solid;
            border-color: #ff5e7e;
            border-radius: 50%;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.15), 0 10px 30px rgba(255, 94, 126, 0.3);
        }

        /* 4. Бирюзовый кристалл/конус */
        .shape-crystal {
            background: radial-gradient(circle at 35% 35%, #00f2fe, #4facfe 60%, #0000ff);
            border-radius: 35% 65% 55% 45% / 45% 35% 65% 55%;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.3);
        }

        /* Анимация легкого покачивания на месте после прилета */
        .decor-shape.animated {
            animation: float-idle 8s ease-in-out infinite alternate;
        }
        @keyframes float-idle {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(15deg); }
        }

        /* --- КОНТЕЙНЕР КАРТОЧКИ --- */
        .tariff-container {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 30px 70px rgba(26, 21, 58, 0.08);
            z-index: 10;
            position: relative;
            backdrop-filter: blur(8px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        body.loaded .tariff-container {
            opacity: 1;
            transform: translateY(0);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            color: white;
            font-weight: 800;
            font-size: 0.85rem;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            background-color: var(--tariff-accent, #33ccff);
        }

        h1 {
            font-size: 2.3rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .price-tag {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--tariff-accent, #33ccff);
            margin-bottom: 30px;
        }

        .info-section {
            margin-bottom: 25px;
        }

        .info-section h3 {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .info-section p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1rem;
        }

        .tech-specs {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .tech-specs li {
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .tech-specs li::before {
            content: '⚡';
            color: var(--tariff-accent, #33ccff);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 35px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--tariff-accent, #33ccff);
            color: white;
            box-shadow: 0 10px 25px rgba(26, 21, 58, 0.1);
        }

        .btn-secondary {
            background: rgba(97, 92, 133, 0.1);
            color: var(--text-main);
        }
        
        body.dark-theme .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="decor-shape shape-sphere" id="s-sphere"></div>
    <div class="decor-shape shape-blob" id="s-blob"></div>
    <div class="decor-shape shape-donut" id="s-donut"></div>
    <div class="decor-shape shape-crystal" id="s-crystal"></div>

    <div class="tariff-container" id="container">
        <div class="badge" id="tariffBadge">Тариф</div>
        <h1 id="tariffTitle">Загрузка...</h1>
        <div class="price-tag" id="tariffPrice">...</div>
        
        <div class="info-section">
            <h3>Что входит в стоимость:</h3>
            <p id="tariffDescription">Описание подгружается...</p>
        </div>

        <div class="info-section">
            <h3>Технические особенности реализации:</h3>
            <ul class="tech-specs" id="tariffSpecs"></ul>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="goToOrderForm()">Связаться</button>
            <button class="btn btn-secondary" onclick="handleBack()">← К тарифам</button>
        </div>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }

        const data = {
            vizitka: {
                badge: "Базовый", title: "Сайт-визитка", price: "от 15 000 ₽", color: "#33ccff",
                desc: "Идеальный вариант для быстрого старта в сети. Подходит частным мастерам, начинающим специалистам и небольшим фирмам Ярославля, которым нужно заявить о себе. Представляет собой стильный одностраничный лендинг с ключевой информацией о продукте, контактами и интерактивной формой обратной связи.",
                specs: ["Чистый семантический HTML5 / CSS3", "Полная адаптивность под любые экраны мобильных", "Легковесный код (загрузка за доли секунды)", "Интеграция карт (Яндекс/Google)"]
            },
            corp: {
                badge: "Популярный", title: "Корпоративный сайт", price: "от 35 000 ₽", color: "#ff3366",
                desc: "Полноценное многостраничное решение для развивающегося бизнеса. Позволяет детально презентовать структуру компании, филиалы, выложить структурированный каталог услуг или товаров с фильтрами, а также вести собственный блог или раздел новостей.",
                specs: ["Архитектура на JavaScript / Компонентная структура", "Динамические модули (галереи, фильтрация данных)", "Оптимизация внутренней иерархии страниц под SEO", "Защищенные формы отправки данных"]
            },
            shop: {
                badge: "Максимум", title: "Интернет-магазин", price: "от 60 000 ₽", color: "#b800ff",
                desc: "Мощная коммерческая машина для автоматизации продаж. Включает сложную логику корзины покупок, интеграцию личных кабинетов пользователей, системы фильтрации по десяткам параметров, а также безопасный шлюз приема онлайн-оплаты.",
                specs: ["Проектирование сложных баз данных (Каталог/Товары)", "Интеграция CRM-систем и учетных программ (1С/МойСклад)", "Подключение API интернет-эквайринга (Сбер/Т-Банк)", "Модули личных кабинетов и истории заказов"]
            }
        };

        const layoutConfig = {
            vizitka: {
                sphere:  { top: '8%', left: '6%', width: '140px', height: '140px', filter: 'blur(0px)' },
                blob:    { top: '70%', left: '5%', width: '90px', height: '90px', filter: 'blur(2px)' },
                donut:   { bottom: '8%', right: '7%', width: '110px', height: '110px', borderWidth: '25px', filter: 'blur(1px)' },
                crystal: { top: '15%', right: '12%', width: '70px', height: '70px', filter: 'blur(3px)' }
            },
            corp: {
                sphere:  { top: '65%', left: '8%', width: '90px', height: '90px', filter: 'blur(1px)' },
                blob:    { top: '12%', right: '10%', width: '130px', height: '130px', filter: 'blur(0px)' },
                donut:   { top: '15%', left: '14%', width: '75px', height: '75px', borderWidth: '18px', filter: 'blur(2px)' },
                crystal: { bottom: '10%', right: '6%', width: '120px', height: '120px', filter: 'blur(1px)' }
            },
            shop: {
                sphere:  { top: '15%', right: '6%', width: '110px', height: '110px', filter: 'blur(2px)' },
                blob:    { bottom: '12%', left: '7%', width: '120px', height: '120px', filter: 'blur(1px)' },
                donut:   { top: '8%', left: '5%', width: '150px', height: '150px', borderWidth: '32px', filter: 'blur(0px)' },
                crystal: { bottom: '20%', right: '15%', width: '80px', height: '80px', filter: 'blur(3px)' }
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'vizitka';
        const currentTariff = data[type] || data.vizitka;
        const config = layoutConfig[type] || layoutConfig.vizitka;

        document.getElementById('container').style.setProperty('--tariff-accent', currentTariff.color);
        document.body.style.setProperty('--tariff-accent', currentTariff.color);
        
        document.getElementById('tariffBadge').innerText = currentTariff.badge;
        document.getElementById('tariffTitle').innerText = currentTariff.title;
        document.getElementById('tariffPrice').innerText = currentTariff.price;
        document.getElementById('tariffDescription').innerText = currentTariff.desc;
        document.title = `${currentTariff.title} — Детали тарифа YARWEB`;

        const specsList = document.getElementById('tariffSpecs');
        specsList.innerHTML = ''; 
        currentTariff.specs.forEach(spec => {
            const li = document.createElement('li');
            li.innerText = spec;
            specsList.appendChild(li);
        });

        const shapes = {
            sphere: document.getElementById('s-sphere'),
            blob: document.getElementById('s-blob'),
            donut: document.getElementById('s-donut'),
            crystal: document.getElementById('s-crystal')
        };

        Object.keys(shapes).forEach(key => {
            shapes[key].style.top = '50%';
            shapes[key].style.left = '50%';
            shapes[key].style.width = '20px';
            shapes[key].style.height = '20px';
            if(key === 'donut') shapes[key].style.borderWidth = '5px';
        });

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
                
                Object.keys(shapes).forEach(key => {
                    const el = shapes[key];
                    const cfg = config[key];
                    
                    if(cfg.top) el.style.top = cfg.top;
                    if(cfg.bottom) { el.style.top = 'auto'; el.style.bottom = cfg.bottom; }
                    if(cfg.left) el.style.left = cfg.left;
                    if(cfg.right) { el.style.left = 'auto'; el.style.right = cfg.right; }
                    
                    el.style.width = cfg.width;
                    el.style.height = cfg.height;
                    el.style.filter = cfg.filter;
                    if(key === 'donut' && cfg.borderWidth) el.style.borderWidth = cfg.borderWidth;
                });

                setTimeout(() => {
                    Object.keys(shapes).forEach(key => shapes[key].classList.add('animated'));
                }, 1400);

            }, 100);
        });

        /// 🔥 ИСПРАВЛЕННАЯ НАВИГАЦИЯ ДЛЯ КНОПКИ «СВЯЗАТЬСЯ»
        function goToOrderForm() {
            // Перенаправляем на отдельную страницу контактов в текущей вкладке
            // type у нас уже определен в начале скрипта (vizitka, corp или shop)
            window.location.href = `contact.html?tariff=${type}`;
        }

        // КНОПКА «К ТАРИФАМ»
        function handleBack() {
            window.close();
        }
</script>
</body>
</html>
