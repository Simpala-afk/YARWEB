<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали тарифа — YARWEB</title>
    <style>
        :root {
            --bg-color: #fcfbf9;
            --text-main: #1a153a;
            --text-muted: #615c85;
            --card-bg: #ffffff;
            --card-border: rgba(26, 21, 58, 0.05);
            --grid-opacity: 0.02;
        }

        body.dark-theme {
            --bg-color: #0b0819;
            --text-main: #fcfbf9; 
            --text-muted: #9fa8da; 
            --card-bg: #131026; 
            --card-border: rgba(255, 255, 255, 0.05);
            --grid-opacity: 0.04;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            /* ФИКС ДЛЯ СМАРТФОНОВ: разрешаем вертикальный скролл и делаем его плавным на iOS */
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .bg-grid {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(26, 21, 58, var(--grid-opacity)) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26, 21, 58, var(--grid-opacity)) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* 🔮 ФИГУРЫ И ОРБИТЫ */
        .decor-shape {
            position: absolute;
            z-index: 1; /* Оставляем на нижнем слое под карточкой */
            opacity: 0;
            transition: all 1.4s cubic-bezier(0.25, 1, 0.3, 1);
            /* ФИКС ДЛЯ СМАРТФОНОВ: палец кликает и скроллит СКВОЗЬ фигуры, они не блокируют экран */
            pointer-events: none; 
        }

        body.loaded .decor-shape {
            opacity: 0.85;
        }

        .shape-sphere {
            background: radial-gradient(circle at 30% 30%, #5ce1e6, #36b5d8 40%, #1c7293);
            border-radius: 50%;
        }

        .shape-blob {
            background: radial-gradient(circle at 30% 30%, #bf55ec, #8e44ad 50%, #5e2775);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
        }

        .shape-donut {
            border: 30px solid #ff5e7e;
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
        }

        .shape-crystal {
            background: radial-gradient(circle at 35% 35%, #00f2fe, #4facfe 60%, #0000ff);
            border-radius: 35% 65% 55% 45% / 45% 35% 65% 55%;
        }

        /* АНИМАЦИЯ ПОКАЧИВАНИЯ ФИГУР */
        @keyframes floatSphere { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-10px, -20px) rotate(5deg); } }
        @keyframes floatBlob { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(15px, -15px) scale(1.03); } }
        @keyframes floatDonut { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(-15px, 10px) rotate(-8deg); } }
        @keyframes floatCrystal { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(10px, 15px) rotate(12deg); } }

        .shape-sphere.animated { animation: floatSphere 6s ease-in-out infinite alternate; }
        .shape-blob.animated { animation: floatBlob 7s ease-in-out infinite alternate; }
        .shape-donut.animated { animation: floatDonut 8s ease-in-out infinite alternate; }
        .shape-crystal.animated { animation: floatCrystal 5.5s ease-in-out infinite alternate; }

        /* 🪐 ШТРИХОВАННЫЕ ОРБИТЫ */
        .figure-orbit {
            position: absolute;
            border: 1px dashed var(--text-muted);
            border-radius: 50%;
            opacity: 0.12;
            transform: rotate(-15deg);
            z-index: 1;
            pointer-events: none; /* Защита от перекрытия пальца */
        }

        /* ✨ МЕРЦАЮЩИЕ ЗВЕЗДОЧКИ */
        .sparkle {
            position: absolute;
            background: #fff;
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            opacity: 0.4;
            z-index: 1;
            pointer-events: none;
            animation: blink 3s ease-in-out infinite alternate;
        }
        body.dark-theme .sparkle {
            background: var(--text-muted);
            filter: drop-shadow(0 0 4px var(--text-muted));
        }
        @keyframes blink {
            0% { transform: scale(0.6); opacity: 0.15; }
            100% { transform: scale(1.2); opacity: 0.5; }
        }

        /* 📄 КАРТОЧКА ТАРИФА */
        .tariff-container {
            background-color: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 30px 70px rgba(26, 21, 58, 0.05);
            /* ФИКС ДЛЯ СМАРТФОНОВ: поднимаем карточку выше фона, чтобы скролл работал именно по ней */
            position: relative;
            z-index: 10; 
            backdrop-filter: blur(8px);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        body.loaded .tariff-container {
            opacity: 1;
            transform: translateY(0);
        }

        .back-btn {
            background: none; border: none;
            color: var(--text-muted);
            font-size: 1rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            margin-bottom: 25px; transition: color 0.2s;
        }
        .back-btn:hover { color: var(--text-main); }

        .tariff-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .tariff-title { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; }
        .tariff-badge { font-size: 0.8rem; font-weight: 800; padding: 6px 14px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }

        .tariff-price { font-size: 2.2rem; font-weight: 900; margin-bottom: 12px; letter-spacing: -0.5px; }
        .tariff-price span { font-size: 1rem; color: var(--text-muted); font-weight: 600; }
        .tariff-desc { color: var(--text-muted); font-size: 1rem; line-height: 1.5; margin-bottom: 30px; font-weight: 500; }

        .features-list { list-style: none; display: flex; flex-direction: column; gap: 16px; margin-bottom: 35px; }
        .feature-item { display: flex; align-items: flex-start; gap: 14px; font-size: 0.95rem; line-height: 1.4; font-weight: 600; }
        .feature-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

        .action-btn {
            width: 100%; padding: 18px; border: none; border-radius: 16px;
            color: #ffffff; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(26, 21, 58, 0.1);
        }
        .action-btn:hover {
            transform: translateY(-2px);
        }

        /* Адаптивность для мобилок */
        @media (max-width: 576px) {
            body { padding: 12px; }
            .tariff-container { padding: 25px 20px; border-radius: 24px; }
            .tariff-title { font-size: 1.6rem; }
            .tariff-price { font-size: 1.9rem; }
            .decor-shape { display: none; } /* На смартфонах убираем тяжелый декор, оставляя только чистую карточку */
            .figure-orbit, .sparkle { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="figure-orbit" style="top: 11%; left: 9%; width: 180px; height: 180px;"></div>
    <div class="figure-orbit" style="top: 14%; right: 9%; width: 170px; height: 170px;"></div>
    <div class="figure-orbit" style="bottom: 11%; left: 7%; width: 170px; height: 170px;"></div>
    <div class="sparkle" style="top: 12%; left: 24%; width: 12px; height: 12px;"></div>
    <div class="sparkle" style="top: 28%; left: 9%; width: 8px; height: 8px;"></div>
    <div class="sparkle" style="top: 15%; right: 24%; width: 14px; height: 14px;"></div>

    <div class="decor-shape shape-sphere" id="shapeSphere"></div>
    <div class="decor-shape shape-blob" id="shapeBlob"></div>
    <div class="decor-shape shape-donut" id="shapeDonut"></div>
    <div class="decor-shape shape-crystal" id="shapeCrystal"></div>

    <div class="tariff-container">
        <button class="back-btn" onclick="handleBack()">← К тарифам</button>
        
        <div class="tariff-header">
            <h1 class="tariff-title" id="title">Загрузка...</h1>
            <span class="tariff-badge" id="badge">-</span>
        </div>
        
        <div class="tariff-price" id="price">0 ₽</div>
        <p class="tariff-desc" id="desc">...</p>
        
        <ul class="features-list" id="features">
            </ul>
        
        <button class="action-btn" id="actionBtn" onclick="goToOrderForm()">Связаться</button>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'vizitka';

        const tariffData = {
            vizitka: {
                title: 'Сайт-визитка',
                badge: 'Старт',
                price: 'от 4 900 ₽',
                desc: 'Идеальное решение для быстрого старта в сети. Лаконичный одностраничный сайт, который презентует ваши услуги, расскажет о преимуществах и соберет первые контакты клиентов.',
                color: '#33ccff',
                shadow: 'rgba(51, 204, 255, 0.3)',
                features: [
                    { icon: '✨', text: 'Уникальный минималистичный веб-дизайн' },
                    { icon: '📱', text: 'Полная адаптивность под смартфоны и планшеты' },
                    { icon: '⚡', text: 'Высокая скорость загрузки страниц' },
                    { icon: '📝', text: 'Удобная форма обратной связи или кнопка Telegram/WhatsApp' },
                    { icon: '🔍', text: 'Базовая SEO-оптимизация для индексации в Яндекс' }
                ],
                shapes: {
                    sphere: { top: '15%', left: '10%', width: '130px', height: '130px', filter: 'none' },
                    donut: { top: '20%', right: '12%', width: '90px', height: '90px', filter: 'blur(3px)' },
                    blob: { bottom: '15%', left: '14%', width: '100px', height: '100px', filter: 'blur(2px)' },
                    crystal: { bottom: '18%', right: '10%', width: '110px', height: '110px', filter: 'none' }
                }
            },
            corp: {
                title: 'Корпоративный',
                badge: 'Бизнес',
                price: 'от 14 900 ₽',
                desc: 'Полноценный многостраничный сайт компании. Формирует статус бренда, подробно рассказывает о каталоге услуг, содержит блоги, галереи и сложные интерактивные элементы взаимодействия.',
                color: '#ff3366',
                shadow: 'rgba(255, 51, 102, 0.3)',
                features: [
                    { icon: '💎', text: 'Премиальный дизайн, разработанный под вашу нишу' },
                    { icon: '📂', text: 'Разветвленная структура страниц (О компании, Услуги, Отзывы)' },
                    { icon: '📊', text: 'Интеграция интерактивных карт, калькуляторов стоимости' },
                    { icon: '🔐', text: 'Подключение систем аналитики (Яндекс Метрика)' },
                    { icon: '🚀', text: 'Первичная оптимизация текстов под поисковые запросы' }
                ],
                shapes: {
                    donut: { top: '14%', left: '12%', width: '120px', height: '120px', filter: 'none', borderWidth: '26px' },
                    crystal: { top: '22%', right: '15%', width: '90px', height: '90px', filter: 'blur(2px)' },
                    sphere: { bottom: '18%', left: '10%', width: '110px', height: '110px', filter: 'blur(1px)' },
                    blob: { bottom: '12%', right: '12%', width: '140px', height: '140px', filter: 'none' }
                }
            },
            shop: {
                title: 'Интернет-магазин',
                badge: 'Максимум',
                price: 'от 24 900 ₽',
                desc: 'Мощный инструмент для онлайн-торговли. Полноценный каталог товаров, автоматизированные корзины покупок, интеграция платежных систем и личные кабинеты для ваших покупателей.',
                color: '#b800ff',
                shadow: 'rgba(184, 0, 255, 0.3)',
                features: [
                    { icon: '🛒', text: 'Каталог с фильтрацией, поиском и умной корзиной' },
                    { icon: '💳', text: 'Подключение онлайн-оплаты (СБП, карты, ЮKassa)' },
                    { icon: '📦', text: 'Синхронизация заказов с Telegram-уведомлениями или CRM' },
                    { icon: '📈', text: 'Удобная панель управления для добавления товаров' },
                    { icon: '🛡️', text: 'Повышенная безопасность персональных данных и SSL' }
                ],
                shapes: {
                    blob: { top: '16%', left: '15%', width: '120px', height: '120px', filter: 'blur(1px)' },
                    sphere: { top: '18%', right: '10%', width: '130px', height: '130px', filter: 'none' },
                    crystal: { bottom: '14%', left: '11%', width: '100px', height: '100px', filter: 'none' },
                    donut: { bottom: '20%', right: '15%', width: '95px', height: '95px', filter: 'blur(2px)' }
                }
            }
        };

        const current = tariffData[type] || tariffData.vizitka;

        // Наполнение контентом
        document.getElementById('title').innerText = current.title;
        document.getElementById('badge').innerText = current.badge;
        document.getElementById('price').innerHTML = current.price + ' <span>/ под ключ</span>';
        document.getElementById('desc').innerText = current.desc;

        const badgeEl = document.getElementById('badge');
        badgeEl.style.backgroundColor = current.color + '20';
        badgeEl.style.color = current.color;

        const actionBtn = document.getElementById('actionBtn');
        actionBtn.style.backgroundColor = current.color;
        actionBtn.onmouseenter = () => actionBtn.style.boxShadow = `0 12px 28px ${current.shadow}`;
        actionBtn.onmouseleave = () => actionBtn.style.boxShadow = '0 10px 25px rgba(26, 21, 58, 0.1)';

        const listEl = document.getElementById('features');
        current.features.forEach(f => {
            const li = document.createElement('li');
            li.className = 'feature-item';
            li.innerHTML = `<span class="feature-icon">${f.icon}</span><span>${f.text}</span>`;
            listEl.appendChild(li);
        });

        function handleBack() {
            window.close();
        }

        // 🔥 ИСПРАВЛЕННАЯ ФУНКЦИЯ ДЛЯ КНОПКИ «СВЯЗАТЬСЯ»
        function goToOrderForm() {
            window.location.href = `contact.html?tariff=${type}`;
        }

        // Позиционирование 3D-фигур
        window.addEventListener('DOMContentLoaded', () => {
            const shapes = {
                sphere: document.getElementById('shapeSphere'),
                blob: document.getElementById('shapeBlob'),
                donut: document.getElementById('shapeDonut'),
                crystal: document.getElementById('shapeCrystal')
            };

            const config = current.shapes;

            setTimeout(() => {
                document.body.classList.add('loaded');
                
                Object.keys(shapes).forEach(key => {
                    const el = shapes[key];
                    const cfg = config[key];
                    
                    if(cfg.top) el.style.top = cfg.top;
                    if(cfg.bottom) { el.style.top = 'auto'; el.style.bottom = cfg.bottom; }
                    if(cfg.left) el.style.left = cfg.left;
                    if(cfg.right) { el.style.left = 'auto'; el.style.right = cfg.right; }
                    
                    el.style.width = cfg.width;
                    el.style.height = cfg.height;
                    el.style.filter = cfg.filter;
                    if(key === 'donut' && cfg.borderWidth) el.style.borderWidth = cfg.borderWidth;
                });

                setTimeout(() => {
                    Object.keys(shapes).forEach(key => shapes[key].classList.add('animated'));
                }, 1400);

            }, 100);
        });
    </script>
</body>
</html>
