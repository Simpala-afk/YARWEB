<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оставить заявку — YARWEB</title>
    <style>
        :root {
            --bg-color: #fcfbf9;
            --text-main: #1a153a;
            --text-muted: #615c85;
            --card-bg: #ffffff;
            --card-border: rgba(26, 21, 58, 0.05);
            --grid-opacity: 0.02;
            --accent-color: #33ccff;
        }

        body.dark-theme {
            --bg-color: #0b0819;
            --text-main: #fcfbf9; 
            --text-muted: #9fa8da; 
            --card-bg: #131026; 
            --card-border: rgba(255, 255, 255, 0.05);
            --grid-opacity: 0.04;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 🌌 ЗАДНИЙ ФОН И СЕТКА */
        .bg-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .bg-grid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(26, 21, 58, var(--grid-opacity)) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26, 21, 58, var(--grid-opacity)) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* 🪐 ОРБИТЫ ВОКРУГ ФИГУР (Графические элементы) */
        .figure-orbit {
            position: absolute;
            border: 1px dashed var(--text-muted);
            border-radius: 50%;
            opacity: 0.12;
            transform: rotate(-15deg);
        }

        /* ✨ МЕРЦАЮЩИЕ ЗВЕЗДОЧКИ-БЛИКИ */
        .sparkle {
            position: absolute;
            background: #fff;
            clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
            opacity: 0.4;
            animation: blink 3s ease-in-out infinite alternate;
        }
        body.dark-theme .sparkle {
            background: var(--accent-color);
            filter: drop-shadow(0 0 4px var(--accent-color));
        }
        
        @keyframes blink {
            0% { transform: scale(0.6); opacity: 0.15; }
            100% { transform: scale(1.2); opacity: 0.5; }
        }

        /* 🔮 ПРОКАЧАННЫЕ ФИГУРЫ (С глубокими тенями и левитацией) */
        .decor-shape {
            position: absolute; z-index: 2; pointer-events: none; opacity: 0;
            transition: all 1.4s cubic-bezier(0.25, 1, 0.3, 1);
        }
        body.loaded .decor-shape { opacity: 0.9; }

        /* Анимация плавной левитации */
        @keyframes float-hero {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(3deg); }
        }

        .shape-sphere {
            background: radial-gradient(circle at 30% 30%, #5ce1e6, #36b5d8 40%, #1c7293);
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(28, 114, 147, 0.35), 0 30px 60px rgba(0,0,0,0.08);
            top: 15%; left: 12%; width: 110px; height: 110px;
            animation: float-hero 5s ease-in-out infinite alternate;
        }
        
        .shape-donut {
            border: 22px solid #ff5e7e; border-radius: 50%;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2), 0 20px 40px rgba(255, 94, 126, 0.35);
            top: 18%; right: 12%; width: 100px; height: 100px;
            animation: float-hero 6s ease-in-out infinite alternate-reverse;
        }

        .shape-blob {
            background: radial-gradient(circle at 30% 30%, #bf55ec, #8e44ad 50%, #5e2775);
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
            box-shadow: 0 20px 40px rgba(142, 68, 173, 0.35), 0 30px 60px rgba(0,0,0,0.08);
            bottom: 15%; left: 10%; width: 105px; height: 105px;
            animation: float-hero 5.5s ease-in-out infinite alternate;
        }

        .shape-crystal {
            background: radial-gradient(circle at 35% 35%, #00f2fe, #4facfe 60%, #0000ff);
            border-radius: 35% 65% 55% 45% / 45% 35% 65% 55%;
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.35);
            bottom: 18%; right: 14%; width: 85px; height: 85px;
            animation: float-hero 4.5s ease-in-out infinite alternate-reverse;
        }

        /* 📄 КАРТОЧКА ФОРМЫ СВЯЗИ */
        .contact-container {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 540px;
            box-shadow: 0 30px 70px rgba(26, 21, 58, 0.08);
            z-index: 10;
            position: relative;
            backdrop-filter: blur(16px);
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        body.loaded .contact-container { opacity: 1; transform: translateY(0); }

        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -0.5px; text-align: center; }
        p.subtitle { color: var(--text-muted); text-align: center; margin-bottom: 35px; font-size: 0.95rem; }

        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; }
        
        .form-group input, .form-group textarea {
            width: 100%; padding: 16px; border: 2px solid var(--card-border);
            background: rgba(26, 21, 58, 0.01); border-radius: 16px;
            color: var(--text-main); font-size: 1rem; font-weight: 600; outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }
        body.dark-theme .form-group input, body.dark-theme .form-group textarea {
            background: rgba(255, 255, 255, 0.01);
        }
        .form-group input:focus, .form-group textarea:focus { 
            border-color: var(--accent-color); 
            background: transparent;
        }

        .btn-submit {
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            background: var(--accent-color); color: white; font-size: 1rem;
            font-weight: 700; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(51, 204, 255, 0.15);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(51, 204, 255, 0.3); }
        
        .btn-back {
            display: block; text-align: center; margin-top: 25px;
            color: var(--text-muted); text-decoration: none; font-weight: 700; font-size: 0.9rem;
            transition: color 0.2s;
        }
        .btn-back:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-grid"></div>
        
        <div class="figure-orbit" style="top: 11%; left: 9%; width: 180px; height: 180px;"></div>
        <div class="figure-orbit" style="top: 14%; right: 9%; width: 170px; height: 170px;"></div>
        <div class="figure-orbit" style="bottom: 11%; left: 7%; width: 170px; height: 170px;"></div>

        <div class="sparkle" style="top: 12%; left: 24%; width: 12px; height: 12px;"></div>
        <div class="sparkle" style="top: 28%; left: 9%; width: 8px; height: 8px; animation-delay: 1s;"></div>
        <div class="sparkle" style="top: 15%; right: 24%; width: 14px; height: 14px; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="bottom: 26%; left: 20%; width: 10px; height: 10px; animation-delay: 1.5s;"></div>
        <div class="sparkle" style="bottom: 15%; right: 23%; width: 12px; height: 12px;"></div>
    </div>

    <div class="decor-shape shape-sphere"></div>
    <div class="decor-shape shape-blob"></div>
    <div class="decor-shape shape-donut"></div>
    <div class="decor-shape shape-crystal"></div>

    <div class="contact-container">
        <h1 id="formTitle">Оставить заявку</h1>
        <p class="subtitle">Заполните форму, и мы свяжемся с вами в течение 30 минут</p>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" placeholder="Александр" required>
            </div>
            <div class="form-group">
                <label>Номер телефона или Telegram</label>
                <input type="text" placeholder="+7 (999) 000-00-00" required>
            </div>
            <div class="form-group">
                <label>Комментарий к проекту</label>
                <textarea rows="4" id="projectComment" placeholder="Расскажите немного о ваших задачах..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Отправить заявку</button>
        </form>

        <a href="#" class="btn-back" onclick="window.close(); return false;">← Назад к деталям тарифа</a>
    </div>

    <script>
        // Проверка и установка темной темы при запуске
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-theme'); }

        // Считывание тарифа из URL для динамического изменения цвета кнопки и комментариев
        const urlParams = new URLSearchParams(window.location.search);
        const tariff = urlParams.get('tariff');
        
        if (tariff) {
            const tariffConfig = {
                vizitka: { name: 'Сайт-визитка', color: '#33ccff' },
                corp: { name: 'Корпоративный сайт', color: '#ff3366' },
                shop: { name: 'Интернет-магазин', color: '#b800ff' }
            };

            const current = tariffConfig[tariff];
            if (current) {
                document.getElementById('formTitle').innerText = `Заявка на "${current.name}"`;
                document.getElementById('projectComment').value = `Здравствуйте! Меня интересует тариф "${current.name}".`;
                document.documentElement.style.setProperty('--accent-color', current.color);
            }
        }

        // Анимация плавного появления элементов при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.body.classList.add('loaded'); }, 100);
        });
    </script>
</body>
</html>
